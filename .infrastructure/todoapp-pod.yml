apiVersion: v1
kind: Pod
metadata:
  name: todoapp
  namespace: todoapp
  labels:
    app: todoapp
spec:
  containers:
  - name: todoapp
    image: nickptrnko/todoapp:3.0.0
    imagePullPolicy: Always
    ports:
    - containerPort: 8000
    livenessProbe:
      httpGet:
        path: /api/health/live/
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /api/health/ready/
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 5
